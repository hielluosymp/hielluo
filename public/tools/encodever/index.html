<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Encodever — Static Site Hosting</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0f; --surface: #17171a; --surface2: #1e1e24;
      --border: #2a2a2f; --accent: #1188aa; --accent-dim: #0d6a85;
      --text: #f0f0f0; --text-muted: #666; --radius: 12px;
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; height: 100vh; overflow: hidden; display: flex; }

    /* Sidebar */
    #sidebar {
      width: 260px; flex-shrink: 0; background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; height: 100vh; overflow: hidden;
    }
    .sidebar-top {
      padding: 20px 16px 16px; border-bottom: 1px solid var(--border);
    }
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .logo-icon {
      width: 32px; height: 32px; border-radius: 8px; background: var(--accent);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .logo-icon svg { width: 18px; height: 18px; }
    .logo h1 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem; color: #fff; }
    .user-row { display: flex; align-items: center; gap: 8px; }
    .user-avatar {
      width: 28px; height: 28px; border-radius: 50%; background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 0.7rem;
      flex-shrink: 0; overflow: hidden;
    }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-name { font-size: 0.75rem; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .user-email { font-size: 0.65rem; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Sites list */
    .sites-section { flex: 1; overflow-y: auto; padding: 12px 16px; }
    .sites-section::-webkit-scrollbar { width: 3px; }
    .sites-section::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .sites-label { font-size: 0.65rem; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
    .site-item {
      padding: 8px 10px; border-radius: 8px; margin-bottom: 4px;
      background: var(--surface2); border: 1px solid var(--border);
    }
    .site-item-name { font-size: 0.75rem; color: var(--text); font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .site-item-url { font-size: 0.65rem; color: var(--accent); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .site-item-url a { color: inherit; text-decoration: none; }
    .site-item-url a:hover { text-decoration: underline; }
    .site-item-actions { display: flex; gap: 4px; margin-top: 6px; }
    .btn-site-action {
      padding: 2px 8px; border-radius: 4px; font-size: 0.6rem; cursor: pointer;
      border: 1px solid var(--border); background: none; color: var(--text-muted);
      font-family: 'DM Mono', monospace; transition: all 0.15s;
    }
    .btn-site-action:hover { border-color: var(--accent); color: var(--accent); }
    .btn-site-delete:hover { border-color: #f87171 !important; color: #f87171 !important; }
    .sites-empty { font-size: 0.75rem; color: var(--text-muted); text-align: center; padding: 20px 0; }

    /* Sidebar footer */
    .sidebar-footer { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
    .btn-footer {
      flex: 1; padding: 7px; border-radius: 8px; font-size: 0.7rem; cursor: pointer;
      font-family: 'DM Mono', monospace; border: 1px solid var(--border);
      background: none; color: var(--text-muted); transition: all 0.15s; text-align: center; text-decoration: none;
    }
    .btn-footer:hover { border-color: var(--accent); color: var(--accent); }

    /* Main */
    #main { flex: 1; overflow-y: auto; padding: 40px 32px; display: flex; flex-direction: column; align-items: center; }
    #main::-webkit-scrollbar { width: 3px; }
    #main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .upload-card {
      width: 100%; max-width: 640px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 32px;
    }
    .card-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.4rem; margin-bottom: 6px; }
    .card-sub { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 24px; }
    .edit-banner {
      background: rgba(17,136,170,0.12); border: 1px solid var(--accent);
      border-radius: 8px; padding: 10px 14px; margin-bottom: 20px;
      display: none; align-items: center; justify-content: space-between; gap: 8px;
    }
    .edit-banner-text { font-size: 0.75rem; color: var(--accent); }
    .btn-cancel-edit {
      padding: 4px 10px; border-radius: 6px; border: 1px solid var(--accent);
      background: none; color: var(--accent); font-family: 'DM Mono', monospace;
      font-size: 0.7rem; cursor: pointer; transition: all 0.15s;
    }
    .btn-cancel-edit:hover { background: rgba(17,136,170,0.2); }

    .field-label { font-size: 0.7rem; color: var(--text-muted); margin-bottom: 6px; display: block; }
    .field-hint { font-size: 0.65rem; color: var(--text-muted); margin-top: 4px; }
    .text-input {
      width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 14px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.85rem;
      outline: none; transition: border-color 0.2s;
    }
    .text-input:focus { border-color: var(--accent); }
    .text-input::placeholder { color: var(--text-muted); }
    .slug-preview { font-size: 0.65rem; color: var(--accent); margin-top: 4px; min-height: 14px; }

    .tabs { display: flex; background: var(--bg); border-radius: 8px; padding: 3px; margin: 20px 0 16px; gap: 2px; }
    .tab-btn {
      flex: 1; padding: 7px; text-align: center; cursor: pointer; border-radius: 6px;
      font-size: 0.75rem; color: var(--text-muted); transition: all 0.15s;
      border: none; background: none; font-family: 'DM Mono', monospace;
    }
    .tab-btn.active { background: var(--surface2); color: var(--text); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    textarea.code-area {
      width: 100%; height: 220px; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 14px; color: var(--text);
      font-family: 'DM Mono', monospace; font-size: 0.8rem; outline: none;
      resize: vertical; transition: border-color 0.2s; line-height: 1.6;
    }
    textarea.code-area:focus { border-color: var(--accent); }
    textarea.code-area::placeholder { color: var(--text-muted); }

    .file-drop {
      border: 2px dashed var(--border); border-radius: 8px; padding: 40px 20px;
      text-align: center; cursor: pointer; transition: all 0.2s; position: relative;
    }
    .file-drop:hover, .file-drop.drag-over { border-color: var(--accent); background: rgba(17,136,170,0.05); }
    .file-drop input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .file-drop-icon { font-size: 2rem; margin-bottom: 8px; }
    .file-drop-text { font-size: 0.8rem; color: var(--text-muted); }
    .file-drop-text span { color: var(--accent); }
    .file-info-box {
      margin-top: 12px; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 14px; font-size: 0.75rem; display: none;
    }
    .file-info-name { color: var(--text); font-weight: 700; margin-bottom: 2px; }
    .file-info-meta { color: var(--text-muted); font-size: 0.7rem; }

    .deploy-row { margin-top: 20px; display: flex; align-items: center; gap: 12px; }
    .btn-deploy {
      padding: 11px 28px; background: var(--accent); color: #fff; border: none;
      border-radius: 8px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.85rem;
      cursor: pointer; transition: background 0.2s; white-space: nowrap;
    }
    .btn-deploy:hover { background: var(--accent-dim); }
    .btn-deploy:disabled { opacity: 0.5; cursor: not-allowed; }
    .deploy-error { font-size: 0.75rem; color: #f87171; }

    .result-box {
      margin-top: 20px; background: var(--bg); border: 1px solid var(--accent);
      border-radius: 8px; padding: 16px; display: none;
    }
    .result-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
    .result-url-row { display: flex; align-items: center; gap: 8px; }
    .result-url {
      flex: 1; color: var(--accent); font-size: 0.85rem; word-break: break-all;
      text-decoration: none;
    }
    .result-url:hover { text-decoration: underline; }
    .btn-copy {
      padding: 5px 12px; border: 1px solid var(--border); border-radius: 6px;
      background: none; color: var(--text-muted); font-family: 'DM Mono', monospace;
      font-size: 0.7rem; cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .btn-copy:hover { border-color: var(--accent); color: var(--accent); }
    .btn-copy.copied { border-color: #4ade80; color: #4ade80; }

    .spinner {
      width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<aside id="sidebar">
  <div class="sidebar-top">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
          <polyline points="16 18 22 12 16 6"/>
          <polyline points="8 6 2 12 8 18"/>
        </svg>
      </div>
      <h1>Encodever</h1>
    </div>
    <div class="user-row">
      <div class="user-avatar" id="user-avatar"></div>
      <div>
        <div class="user-name" id="user-name"></div>
        <div class="user-email" id="user-email"></div>
      </div>
    </div>
  </div>

  <div class="sites-section">
    <div class="sites-label">Your Sites</div>
    <div id="sites-list"><div class="sites-empty">Loading…</div></div>
  </div>

  <div class="sidebar-footer">
    <a href="https://hielluo.org" class="btn-footer">← Hielluo</a>
    <button class="btn-footer" id="btn-signout">Sign out</button>
  </div>
</aside>

<main id="main">
  <div class="upload-card">
    <div class="edit-banner" id="edit-banner">
      <span class="edit-banner-text" id="edit-banner-text">Editing site</span>
      <button class="btn-cancel-edit" id="btn-cancel-edit">Cancel</button>
    </div>
    <div class="card-title" id="card-title">Deploy a new site</div>
    <div class="card-sub" id="card-sub">Your site will be live at <span style="color:var(--accent)">encode.hielluo.org/{name}-{code}</span></div>

    <label class="field-label" for="site-name">Site name</label>
    <input class="text-input" id="site-name" placeholder="my-awesome-site" maxlength="40" autocomplete="off" spellcheck="false"/>
    <div class="slug-preview" id="slug-preview"></div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="paste">Paste HTML</button>
      <button class="tab-btn" data-tab="zip">Upload ZIP</button>
    </div>

    <div class="tab-panel active" id="tab-paste">
      <textarea class="code-area" id="html-input" placeholder="<!DOCTYPE html>&#10;<html>&#10;  <head><title>My Site</title></head>&#10;  <body>&#10;    <h1>Hello world!</h1>&#10;  </body>&#10;</html>"></textarea>
    </div>

    <div class="tab-panel" id="tab-zip">
      <div class="file-drop" id="file-drop">
        <input type="file" id="zip-input" accept=".zip"/>
        <div class="file-drop-icon">📦</div>
        <div class="file-drop-text">Drop your <span>.zip</span> file here or <span>browse</span></div>
      </div>
      <div class="file-info-box" id="file-info-box">
        <div class="file-info-name" id="file-info-name"></div>
        <div class="file-info-meta" id="file-info-meta"></div>
      </div>
    </div>

    <div class="deploy-row">
      <button class="btn-deploy" id="deploy-btn">Deploy</button>
      <div class="deploy-error" id="deploy-error"></div>
    </div>

    <div class="result-box" id="result-box">
      <div class="result-label">Your site is live</div>
      <div class="result-url-row">
        <a class="result-url" id="result-url" target="_blank" rel="noopener"></a>
        <button class="btn-copy" id="btn-copy">Copy</button>
      </div>
    </div>
  </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js';
  import { getAuth, onAuthStateChanged, signOut, signInWithCustomToken } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js';

  const firebaseConfig = {
    apiKey: 'AIzaSyC5UX0bdvHs8kolEWrpJ9SG6md9-GcGvq4',
    authDomain: 'hielluo.firebaseapp.com',
    projectId: 'hielluo',
    storageBucket: 'hielluo.firebasestorage.app',
    messagingSenderId: '925488019863',
    appId: '1:925488019863:web:6171eac97352abed9bacd2',
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const _sso = new URLSearchParams(window.location.search).get('sso');
  if (_sso) { history.replaceState(null, '', window.location.pathname); signInWithCustomToken(auth, _sso).catch(() => {}); }

  let currentUser = null;

  auth.authStateReady().then(() => {
    onAuthStateChanged(auth, user => {
      if (!user) { window.location.href = '/'; return; }
      currentUser = user;
      const name = user.displayName || user.email?.split('@')[0] || 'User';
      const initial = name.charAt(0).toUpperCase();
      const av = document.getElementById('user-avatar');
      if (user.photoURL) { av.innerHTML = `<img src="${user.photoURL}" alt="${name}">`; } else { av.textContent = initial; }
      document.getElementById('user-name').textContent = name;
      document.getElementById('user-email').textContent = user.email || '';
      loadSites();
    });
  });

  document.getElementById('btn-signout').addEventListener('click', () => signOut(auth).then(() => window.location.href = '/'));

  // ── Tabs ──
  let activeTab = 'paste';
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeTab = btn.dataset.tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === `tab-${activeTab}`));
    });
  });

  // ── Site name slug preview ──
  const BINARY_EXTS = new Set(['png','jpg','jpeg','gif','webp','ico','woff','woff2','ttf','otf','pdf','zip','gz','mp4','mp3','wav','ogg']);

  function slugify(s) {
    return s.trim().toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 40);
  }

  document.getElementById('site-name').addEventListener('input', e => {
    const slug = slugify(e.target.value);
    document.getElementById('slug-preview').textContent = slug ? `encode.hielluo.org/${slug}-xxxxxx` : '';
  });

  // Try to extract title from pasted HTML and suggest it as site name
  document.getElementById('html-input').addEventListener('paste', () => {
    setTimeout(() => {
      const html = document.getElementById('html-input').value;
      const match = html.match(/<title[^>]*>([^<]+)<\/title>/i);
      if (match && !document.getElementById('site-name').value) {
        document.getElementById('site-name').value = match[1].trim().slice(0, 40);
        document.getElementById('site-name').dispatchEvent(new Event('input'));
      }
    }, 0);
  });

  // ── ZIP file input ──
  let zipFiles = null;

  function formatBytes(b) {
    if (b < 1024) return `${b} B`;
    if (b < 1024 * 1024) return `${(b/1024).toFixed(1)} KB`;
    return `${(b/1024/1024).toFixed(1)} MB`;
  }

  async function processZip(file) {
    zipFiles = null;
    document.getElementById('file-info-box').style.display = 'none';
    document.getElementById('deploy-error').textContent = '';
    if (!file) return;
    if (file.size > 10 * 1024 * 1024) {
      document.getElementById('deploy-error').textContent = 'ZIP file too large (max 10MB)';
      return;
    }
    try {
      const zip = await JSZip.loadAsync(file);
      const entries = Object.entries(zip.files).filter(([, e]) => !e.dir && !e.name.startsWith('__MACOSX/') && !e.name.startsWith('.'));
      if (entries.length > 100) { document.getElementById('deploy-error').textContent = 'Too many files (max 100)'; return; }
      // Strip common top-level directory
      const topDirs = new Set(entries.map(([name]) => name.split('/')[0]));
      const singleTop = topDirs.size === 1 && entries.every(([name]) => name.includes('/'));
      zipFiles = await Promise.all(entries.map(async ([name, entry]) => {
        const path = singleTop ? name.slice(name.indexOf('/') + 1) : name;
        if (!path) return null;
        const ext = (name.split('.').pop() || '').toLowerCase();
        const binary = BINARY_EXTS.has(ext);
        const content = await entry.async(binary ? 'base64' : 'text');
        return { path, content, encoding: binary ? 'base64' : 'utf8' };
      }));
      zipFiles = zipFiles.filter(Boolean);
      document.getElementById('file-info-name').textContent = file.name;
      document.getElementById('file-info-meta').textContent = `${zipFiles.length} files · ${formatBytes(file.size)}`;
      document.getElementById('file-info-box').style.display = 'block';
      // Suggest name from zip filename
      if (!document.getElementById('site-name').value) {
        const suggested = file.name.replace(/\.zip$/i, '').slice(0, 40);
        document.getElementById('site-name').value = suggested;
        document.getElementById('site-name').dispatchEvent(new Event('input'));
      }
    } catch (e) {
      document.getElementById('deploy-error').textContent = 'Failed to read ZIP: ' + e.message;
    }
  }

  document.getElementById('zip-input').addEventListener('change', e => processZip(e.target.files[0]));

  const dropZone = document.getElementById('file-drop');
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file?.name.endsWith('.zip')) processZip(file);
  });

  // ── Edit mode ──
  let editingSiteId = null;

  function enterEditMode(siteId, siteName) {
    editingSiteId = siteId;
    document.getElementById('edit-banner').style.display = 'flex';
    document.getElementById('edit-banner-text').textContent = `Editing: encode.hielluo.org/${siteId}`;
    document.getElementById('card-title').textContent = 'Edit site';
    document.getElementById('card-sub').textContent = 'Changes will update your live site immediately.';
    document.getElementById('site-name').value = siteName;
    document.getElementById('site-name').disabled = true;
    document.getElementById('slug-preview').textContent = '';
    document.getElementById('deploy-btn').textContent = 'Update';
    document.getElementById('result-box').style.display = 'none';
    document.getElementById('deploy-error').textContent = '';
    document.getElementById('main').scrollTo({ top: 0, behavior: 'smooth' });
  }

  function exitEditMode() {
    editingSiteId = null;
    document.getElementById('edit-banner').style.display = 'none';
    document.getElementById('card-title').textContent = 'Deploy a new site';
    document.getElementById('card-sub').innerHTML = 'Your site will be live at <span style="color:var(--accent)">encode.hielluo.org/{name}-{code}</span>';
    document.getElementById('site-name').value = '';
    document.getElementById('site-name').disabled = false;
    document.getElementById('slug-preview').textContent = '';
    document.getElementById('deploy-btn').textContent = 'Deploy';
    document.getElementById('html-input').value = '';
    document.getElementById('result-box').style.display = 'none';
    document.getElementById('deploy-error').textContent = '';
  }

  document.getElementById('btn-cancel-edit').addEventListener('click', exitEditMode);

  window.editSite = async (siteId, siteName, fileCount) => {
    enterEditMode(siteId, siteName);
    if (fileCount > 1) {
      // ZIP site — switch to ZIP tab, show message
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === 'zip'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-zip'));
      activeTab = 'zip';
      zipFiles = null;
      document.getElementById('file-info-box').style.display = 'none';
      document.getElementById('deploy-error').textContent = 'This site has multiple files. Upload a new ZIP to update it.';
      return;
    }
    // Single-file site — load index.html into textarea
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === 'paste'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-paste'));
    activeTab = 'paste';
    document.getElementById('html-input').value = 'Loading…';
    try {
      const idToken = await currentUser.getIdToken();
      const res = await fetch(`/encodever/file?siteId=${encodeURIComponent(siteId)}&path=index.html&idToken=${encodeURIComponent(idToken)}`);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      document.getElementById('html-input').value = data.content;
    } catch (e) {
      document.getElementById('html-input').value = '';
      document.getElementById('deploy-error').textContent = 'Failed to load site: ' + e.message;
    }
  };

  // ── Deploy / Update ──
  document.getElementById('deploy-btn').addEventListener('click', async () => {
    const btn = document.getElementById('deploy-btn');
    const errEl = document.getElementById('deploy-error');
    errEl.textContent = '';
    document.getElementById('result-box').style.display = 'none';

    const name = document.getElementById('site-name').value.trim();
    if (!name) { errEl.textContent = 'Enter a site name.'; return; }

    let files;
    if (activeTab === 'paste') {
      const html = document.getElementById('html-input').value.trim();
      if (!html) { errEl.textContent = 'Paste some HTML first.'; return; }
      files = [{ path: 'index.html', content: html, encoding: 'utf8' }];
    } else {
      if (!zipFiles) { errEl.textContent = 'Select a ZIP file first.'; return; }
      files = zipFiles;
    }

    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div>';

    try {
      const idToken = await currentUser.getIdToken();
      const endpoint = editingSiteId ? '/encodever/update' : '/encodever/upload';
      const body = editingSiteId
        ? { idToken, siteId: editingSiteId, files }
        : { idToken, name, files };
      const res = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (!res.ok || data.error) throw new Error(data.error || 'Failed');
      const urlEl = document.getElementById('result-url');
      urlEl.href = data.url;
      urlEl.textContent = data.url;
      document.getElementById('result-box').style.display = 'block';
      if (editingSiteId) exitEditMode();
      loadSites();
    } catch (e) {
      errEl.textContent = e.message;
    } finally {
      btn.disabled = false;
      btn.textContent = editingSiteId ? 'Update' : 'Deploy';
    }
  });

  // ── Copy URL ──
  document.getElementById('btn-copy').addEventListener('click', () => {
    const url = document.getElementById('result-url').textContent;
    navigator.clipboard.writeText(url).then(() => {
      const btn = document.getElementById('btn-copy');
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
    });
  });

  // ── Sites list ──
  async function loadSites() {
    if (!currentUser) return;
    const idToken = await currentUser.getIdToken();
    const res = await fetch(`/encodever/sites?idToken=${encodeURIComponent(idToken)}`);
    const data = await res.json().catch(() => ({ sites: [] }));
    renderSites(data.sites || []);
  }

  function renderSites(sites) {
    const el = document.getElementById('sites-list');
    if (!sites.length) { el.innerHTML = '<div class="sites-empty">No sites yet.</div>'; return; }
    el.innerHTML = sites.map(s => `
      <div class="site-item" data-id="${s.siteId}">
        <div class="site-item-name">${s.name}</div>
        <div class="site-item-url"><a href="${s.url}" target="_blank" rel="noopener">${s.url.replace('https://', '')}</a></div>
        <div class="site-item-actions">
          <button class="btn-site-action" onclick="editSite('${s.siteId}','${s.name}',${(s.files||[]).length})">Edit</button>
          <button class="btn-site-action" onclick="copySiteUrl('${s.url}')">Copy</button>
          <button class="btn-site-action btn-site-delete" onclick="deleteSite('${s.siteId}')">Delete</button>
        </div>
      </div>`).join('');
  }

  window.copySiteUrl = (url) => navigator.clipboard.writeText(url);

  window.deleteSite = async (siteId) => {
    if (!confirm('Delete this site? This cannot be undone.')) return;
    const idToken = await currentUser.getIdToken();
    const res = await fetch('/encodever/delete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ idToken, siteId }),
    });
    if (res.ok) loadSites();
  };
</script>
</body>
</html>
